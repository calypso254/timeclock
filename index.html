<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations Suite</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Tailwind Config to support our dual-font setup -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'Arial', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Clean, professional dual-font pairing -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --panel-card-width: 180px;
            --panel-card-gap: 16px;
            --panel-five-col-max: 972px;
        }
        body {
            /* Creamy pastel yellow background */
            background-color: #fef3c7; 
            color: #060606; /* Softer black for high readability */
            transition: background-color 0.5s ease;
        }
        
        /* Soft Brutalism CSS Classes */
        .brutal-card {
            background-color: #ffffff;
            border: 3px solid #000000;
            border-radius: 1.5rem;
            box-shadow: 6px 6px 0px 0px #000000;
        }
        
        .brutal-btn {
            border: 2px solid #000000;
            border-radius: 1rem;
            box-shadow: 4px 4px 0px 0px #000000;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            font-family: 'Poppins', sans-serif;
            font-weight: 700; /* Bold (700) instead of Extrabold */
            color: #060606;
            cursor: pointer;
        }
        
        .brutal-btn:active:not(:disabled) {
            box-shadow: 0px 0px 0px 0px #000000;
            transform: translate(4px, 4px);
        }
        
        .brutal-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #e5e7eb !important;
        }

        .brutal-input {
            border: 2px solid #000000;
            border-radius: 0.75rem;
            background-color: #ffffff;
            transition: all 0.2s ease;
            font-family: 'Roboto', sans-serif;
            color: #060606;
        }
        .brutal-input:focus {
            outline: none;
            box-shadow: 4px 4px 0px 0px #000000;
            background-color: #f0fdf4; /* Light mint focus */
        }

        /* Specialized Pin Pad Buttons */
        .pin-btn {
            aspect-ratio: 1;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        /* Hide scrollbar for clean UI but allow scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .shadow-safe-2 { padding: 2px; }
        .shadow-safe-3 { padding: 3px; }
        .shadow-safe-4 { padding: 4px; }
        .shadow-safe-6 { padding: 6px; }
        .panel-content-5 {
            width: 100%;
            max-width: var(--panel-five-col-max);
            margin-left: auto;
            margin-right: auto;
        }
        .panel-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(var(--panel-card-width), var(--panel-card-width)));
            gap: var(--panel-card-gap);
            justify-content: start;
            align-content: start;
        }
        .panel-card-width {
            width: min(100%, var(--panel-card-width));
            max-width: 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- HELPER FUNCTIONS ---
        
        const normalizeDate = (dStr) => {
            if (typeof dStr === 'string' && /^\d{4}-\d{2}-\d{2}/.test(dStr)) {
                return dStr.substring(0, 10);
            }
            const d = new Date(dStr);
            if (isNaN(d)) return dStr;
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        // Helper to safely parse dates regardless of local YYYY-MM-DD or M/D/YYYY formatting
        const parseLocalDate = (dateValue) => {
            if (!dateValue) return new Date();

            if (dateValue instanceof Date) {
                return new Date(dateValue.getFullYear(), dateValue.getMonth(), dateValue.getDate());
            }

            if (typeof dateValue === 'number') {
                const numericDate = new Date(dateValue);
                if (isNaN(numericDate.getTime())) return numericDate;
                return new Date(numericDate.getFullYear(), numericDate.getMonth(), numericDate.getDate());
            }

            const dateStr = String(dateValue).trim();
            const isoMatch = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (isoMatch) {
                return new Date(parseInt(isoMatch[1], 10), parseInt(isoMatch[2], 10) - 1, parseInt(isoMatch[3], 10));
            }

            const slashMatch = dateStr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if (slashMatch) {
                return new Date(parseInt(slashMatch[3], 10), parseInt(slashMatch[1], 10) - 1, parseInt(slashMatch[2], 10));
            }

            return new Date(dateStr);
        };

        const formatMonthDayDate = (dateStr) => {
            const dateObj = parseLocalDate(dateStr);
            if (isNaN(dateObj.getTime())) return '';
            return dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        };

        const formatFullDate = (dateStr) => {
            if (!dateStr) return '';
            const dateObj = parseLocalDate(dateStr);
            if (isNaN(dateObj.getTime())) return normalizeDate(dateStr);
            return dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        };

        const getWeekStartDate = (dateValue = new Date()) => {
            const dateObj = parseLocalDate(dateValue);
            const day = dateObj.getDay();
            const diff = dateObj.getDate() - day;
            return new Date(dateObj.getFullYear(), dateObj.getMonth(), diff);
        };

        const ADMIN_ROLES = ['admin', 'manager', 'owner'];
        const DEFAULT_ADMIN_SCHEDULE_STATUS = 'Draft';
        const PAYROLL_PERIOD_ANCHOR = '2026-03-16';
        const PAYROLL_PERIOD_LENGTH_DAYS = 14;
        const PAYROLL_PAYDAY_OFFSET_DAYS = 5;

        const addDaysToLocalDate = (dateValue, dayCount) => {
            const dateObj = parseLocalDate(dateValue);
            const nextDate = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
            nextDate.setDate(nextDate.getDate() + dayCount);
            return nextDate;
        };

        const getLocalDateDayStamp = (dateValue) => {
            const dateObj = parseLocalDate(dateValue);
            return Date.UTC(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
        };

        const getPayrollPeriodStart = (dateValue = new Date()) => {
            const anchorStamp = getLocalDateDayStamp(PAYROLL_PERIOD_ANCHOR);
            const targetStamp = getLocalDateDayStamp(dateValue);
            const diffDays = Math.floor((targetStamp - anchorStamp) / 86400000);
            const periodIndex = Math.floor(diffDays / PAYROLL_PERIOD_LENGTH_DAYS);
            return addDaysToLocalDate(PAYROLL_PERIOD_ANCHOR, periodIndex * PAYROLL_PERIOD_LENGTH_DAYS);
        };

        const buildPayrollPeriodFromStart = (startDateValue) => {
            const startDate = parseLocalDate(startDateValue);
            const endDate = addDaysToLocalDate(startDate, PAYROLL_PERIOD_LENGTH_DAYS - 1);
            const payDate = addDaysToLocalDate(endDate, PAYROLL_PAYDAY_OFFSET_DAYS);
            return {
                key: normalizeDate(startDate),
                startDate,
                endDate,
                payDate,
                startKey: normalizeDate(startDate),
                endKey: normalizeDate(endDate),
                label: `${formatMonthDayDate(startDate)} - ${formatMonthDayDate(endDate)}`,
                fullLabel: `${formatFullDate(startDate)} - ${formatFullDate(endDate)}`,
            };
        };

        const isAdminRole = (role) => {
            return ADMIN_ROLES.includes(String(role || '').trim().toLowerCase());
        };

        const normalizeAdminScheduleStatus = (value, fallback = DEFAULT_ADMIN_SCHEDULE_STATUS) => {
            const normalized = String(value || '').trim();
            return normalized || fallback;
        };

        const buildEmptyAdminScheduleForm = (employeeName = '', dateValue = new Date()) => ({
            name: employeeName,
            date: normalizeDate(dateValue),
            schedIn: '',
            schedInPeriod: 'AM',
            schedOut: '',
            schedOutPeriod: 'PM',
            scheduleStatus: DEFAULT_ADMIN_SCHEDULE_STATUS,
            clearSchedule: false,
            sourceRow: null,
        });

        const buildEmptyAdminTemplateDraft = () => ({
            schedIn: '',
            schedInPeriod: 'AM',
            schedOut: '',
            schedOutPeriod: 'PM',
            scheduleStatus: DEFAULT_ADMIN_SCHEDULE_STATUS,
        });

        const hasTimeValue = (value) => {
            if (typeof value === 'string') {
                const normalized = value.trim().toLowerCase();
                return normalized !== '' && normalized !== '-' && normalized !== 'n/a';
            }
            return Boolean(value);
        };

        const normalizeClockTimeText = (value) => {
            if (value === null || value === undefined) return '';
            return String(value)
                .replace(/[\u00A0\u202F]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim()
                .toUpperCase();
        };

        const parseClockTimeToMinutes = (value) => {
            if (!hasTimeValue(value)) return null;
            const normalizedValue = normalizeClockTimeText(value);
            const match = normalizedValue.match(/^(\d{1,2}):([0-5]\d)\s*(AM|PM)$/);
            if (!match) return null;

            let hour = parseInt(match[1], 10);
            const minutes = parseInt(match[2], 10);
            if (hour < 1 || hour > 12) return null;

            if (match[3] === 'AM') {
                if (hour === 12) hour = 0;
            } else if (hour !== 12) {
                hour += 12;
            }

            return (hour * 60) + minutes;
        };

        const normalizeTimeForComparison = (value) => {
            const parsedMinutes = parseClockTimeToMinutes(value);
            if (parsedMinutes !== null) return `m:${parsedMinutes}`;
            return normalizeClockTimeText(value);
        };

        const calculateWorkedMinutes = (start, end) => {
            const startMinutes = parseClockTimeToMinutes(start);
            const endMinutes = parseClockTimeToMinutes(end);
            if (startMinutes === null || endMinutes === null) return null;

            let diff = endMinutes - startMinutes;
            if (diff < 0) diff += 24 * 60;
            return diff;
        };

        const formatWorkedDurationForDisplay = (minutes) => {
            if (minutes === null || minutes === undefined) return "-";
            const hours = Math.floor(minutes / 60);
            const remainingMinutes = minutes % 60;
            return `${hours}h ${remainingMinutes}m`;
        };

        const formatWorkedDurationForSheet = (minutes) => {
            if (minutes === null || minutes === undefined) return '';
            return `${Math.floor(minutes / 60)}:${String(minutes % 60).padStart(2, '0')}`;
        };

        const formatDecimalHours = (minutes) => {
            if (minutes === null || minutes === undefined) return '';
            return (minutes / 60).toFixed(2);
        };

        const buildWorkedDurationFields = (timeIn, timeOut) => {
            const workedMinutes = calculateWorkedMinutes(timeIn, timeOut);
            if (workedMinutes === null) {
                return {
                    workedMinutes: '',
                    workedDuration: '',
                    workedDisplay: '',
                    decimalHours: '',
                };
            }

            return {
                workedMinutes,
                workedDuration: formatWorkedDurationForSheet(workedMinutes),
                workedDisplay: formatWorkedDurationForDisplay(workedMinutes),
                decimalHours: formatDecimalHours(workedMinutes),
            };
        };

        const calculateHours = (start, end) => {
            const workedMinutes = calculateWorkedMinutes(start, end);
            return workedMinutes === null ? "-" : formatWorkedDurationForDisplay(workedMinutes);
        };

        const isPublishedSchedule = (row) => {
            return String(row?.scheduleStatus || '').trim().toLowerCase() === 'published';
        };

        const filterTimesheetRowsUpToToday = (rows) => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return rows.filter(row => {
                if (!(row.timeIn || isPublishedSchedule(row))) return false;
                const rowDate = parseLocalDate(row.date);
                if (isNaN(rowDate.getTime())) return false;
                rowDate.setHours(0, 0, 0, 0);
                return rowDate <= today;
            });
        };

        const isSameTimesheetEntry = (a, b) => {
            if (!a || !b) return false;
            return (
                a.name === b.name &&
                normalizeDate(a.date) === normalizeDate(b.date) &&
                normalizeTimeForComparison(a.timeIn || '') === normalizeTimeForComparison(b.timeIn || '') &&
                normalizeTimeForComparison(a.timeOut || '') === normalizeTimeForComparison(b.timeOut || '')
            );
        };

        const isEntryLocked = (row) => {
            return String(row?.payrollStatus || '').trim().toLowerCase() === 'locked';
        };

        const isPayrollRelevantRow = (row) => {
            if (!row) return false;
            if (hasTimeValue(row.decimalHours) || hasTimeValue(row.totalHours)) return true;
            return hasTimeValue(row.timeIn) || hasTimeValue(row.timeOut);
        };

        const getPayrollRowMinutes = (row) => {
            if (!row) return 0;
            const decimalValue = Number.parseFloat(String(row.decimalHours || '').trim());
            if (Number.isFinite(decimalValue) && decimalValue > 0) {
                return Math.round(decimalValue * 60);
            }

            const workedMinutes = calculateWorkedMinutes(row.timeIn, row.timeOut);
            return workedMinutes === null ? 0 : workedMinutes;
        };

        const formatPayrollHours = (minutes) => {
            if (!minutes) return '0.00';
            return (minutes / 60).toFixed(2);
        };

        const getEmployeeRows = (rows, employeeName) => {
            if (!employeeName) return [];
            return rows.filter(row => row.name === employeeName);
        };

        const getOpenShiftRowsForEmployee = (rows, employeeName) => {
            return getEmployeeRows(rows, employeeName)
                .filter(row => hasTimeValue(row.timeIn) && !hasTimeValue(row.timeOut) && !isEntryLocked(row))
                .slice()
                .sort((a, b) => normalizeDate(a.date).localeCompare(normalizeDate(b.date)));
        };

        const listShiftDates = (rows) => {
            return [...new Set((rows || []).map(row => formatFullDate(row.date)).filter(Boolean))].join(', ');
        };

        const buildRowFingerprint = (row) => {
            if (!row) return '';
            return JSON.stringify({
                date: normalizeDate(row.date),
                name: row.name || '',
                timeIn: row.timeIn || '',
                timeOut: row.timeOut || '',
                schedIn: row.schedIn || '',
                schedOut: row.schedOut || '',
                payrollStatus: row.payrollStatus || '',
                scheduleStatus: row.scheduleStatus || '',
            });
        };

        const buildRowContextPayload = (row) => {
            if (!row) {
                return {
                    targetRowDate: '',
                    targetRowKey: '',
                    targetRowTimeIn: '',
                    targetRowTimeOut: '',
                    targetRowSchedIn: '',
                    targetRowSchedOut: '',
                    targetRowPayrollStatus: '',
                    targetRowScheduleStatus: '',
                };
            }

            return {
                targetRowDate: normalizeDate(row.date),
                targetRowKey: buildRowFingerprint(row),
                targetRowTimeIn: row.timeIn || '',
                targetRowTimeOut: row.timeOut || '',
                targetRowSchedIn: row.schedIn || '',
                targetRowSchedOut: row.schedOut || '',
                targetRowPayrollStatus: row.payrollStatus || '',
                targetRowScheduleStatus: row.scheduleStatus || '',
            };
        };

        const buildActionTimestamp = (now = new Date()) => {
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return {
                localDate: `${year}-${month}-${day}`,
                localTime: now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true }),
                isoTimestamp: now.toISOString(),
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || '',
                timezoneOffsetMinutes: now.getTimezoneOffset(),
            };
        };

        const parseWholeNumber = (value, { allowNegative = false } = {}) => {
            if (value === null || value === undefined) return null;
            const trimmed = String(value).trim();
            if (!trimmed) return null;
            if (!/^[+-]?\d+$/.test(trimmed)) return null;
            const parsed = Number(trimmed);
            if (!Number.isFinite(parsed)) return null;
            if (allowNegative) return parsed === 0 ? null : parsed;
            return parsed > 0 ? parsed : null;
        };

        const getInventoryStatusWeight = (status) => {
            switch (String(status || '').trim()) {
                case 'Awaiting Approval':
                    return 0;
                case 'In Process':
                    return 1;
                case 'Open':
                    return 2;
                case 'Complete':
                    return 3;
                default:
                    return 4;
            }
        };

        const sortInventoryRows = (rows) => {
            return (Array.isArray(rows) ? rows : []).slice().sort((a, b) => {
                const statusDelta = getInventoryStatusWeight(a?.status) - getInventoryStatusWeight(b?.status);
                if (statusDelta !== 0) return statusDelta;
                return (b?.rowNumber || 0) - (a?.rowNumber || 0);
            });
        };

        const getOpenInventoryRows = (rows) => {
            return (Array.isArray(rows) ? rows : []).filter(row => (
                Number(row?.stillNeeded || 0) > 0 ||
                Number(row?.inProcess || 0) > 0 ||
                Number(row?.awaitingApproval || 0) > 0
            ));
        };

        const formatInventoryTimestamp = (value) => {
            return value ? String(value) : 'Not yet updated';
        };

        const getInventorySkuText = (row) => {
            return String(row?.sku || '').trim() || 'No SKU';
        };

        const getInventoryNameText = (row) => {
            return String(row?.product || '').trim() || 'No name entered';
        };

        const applySuccessfulPunchLocally = (rows, actionType, employeeName, timestamp, plan, reason = '') => {
            const safeRows = Array.isArray(rows) ? rows.slice() : [];

            if (actionType === 'CLOCK_IN') {
                if (!plan?.row) {
                    return [{
                        date: timestamp.localDate,
                        name: employeeName,
                        schedIn: '',
                        schedOut: '',
                        timeIn: timestamp.localTime,
                        timeOut: '',
                        reason,
                        payrollStatus: 'Open',
                        scheduleStatus: '',
                    }, ...safeRows];
                }

                return safeRows.map(row => (
                    isSameTimesheetEntry(row, plan.row)
                        ? { ...row, timeIn: timestamp.localTime, reason: reason || row.reason || '' }
                        : row
                ));
            }

            if (!plan?.row) {
                return safeRows;
            }

            return safeRows.map(row => (
                isSameTimesheetEntry(row, plan.row)
                    ? { ...row, timeOut: timestamp.localTime }
                    : row
            ));
        };

        const getExpectedActionRow = (rows, actionType, employeeName, timestamp, plan) => {
            if (!Array.isArray(rows)) return null;

            if (actionType === 'CLOCK_IN') {
                return rows.find(row =>
                    row.name === employeeName &&
                    normalizeDate(row.date) === timestamp.localDate &&
                    normalizeTimeForComparison(row.timeIn || '') === normalizeTimeForComparison(timestamp.localTime)
                ) || null;
            }

            return rows.find(row =>
                row.name === employeeName &&
                normalizeDate(row.date) === timestamp.localDate &&
                normalizeTimeForComparison(row.timeOut || '') === normalizeTimeForComparison(timestamp.localTime) &&
                (!plan?.row?.timeIn || normalizeTimeForComparison(row.timeIn || '') === normalizeTimeForComparison(plan.row.timeIn || ''))
            ) || null;
        };

        const getExpectedScheduleRow = (rows, payload) => {
            if (!Array.isArray(rows) || !payload) return null;

            return rows.find(row =>
                row.name === payload.name &&
                normalizeDate(row.date) === payload.date &&
                normalizeTimeForComparison(row.schedIn || '') === normalizeTimeForComparison(payload.schedIn || '') &&
                normalizeTimeForComparison(row.schedOut || '') === normalizeTimeForComparison(payload.schedOut || '') &&
                String(row.scheduleStatus || '').trim() === String(payload.scheduleStatus || '').trim()
            ) || null;
        };

        const getLateStartNote = (scheduledIn, actualTime) => {
            const scheduledMinutes = parseClockTimeToMinutes(scheduledIn);
            const actualMinutes = parseClockTimeToMinutes(actualTime);
            if (scheduledMinutes === null || actualMinutes === null) return '';
            return (actualMinutes - scheduledMinutes) > 5 ? 'Late Start' : '';
        };

        const resolveClockInPlan = (rows, employeeName, localDate) => {
            const openShifts = getOpenShiftRowsForEmployee(rows, employeeName);
            const sameDayOpen = openShifts.filter(row => normalizeDate(row.date) === localDate);
            const olderOpen = openShifts.filter(row => normalizeDate(row.date) < localDate);
            const futureOpen = openShifts.filter(row => normalizeDate(row.date) > localDate);

            if (sameDayOpen.length === 1 && openShifts.length === 1) {
                return {
                    status: 'blocked',
                    code: 'already-clocked-in',
                    message: `${employeeName} is already clocked in for ${formatFullDate(localDate)}.`,
                    rows: sameDayOpen,
                };
            }

            if (openShifts.length > 1 || sameDayOpen.length > 1) {
                return {
                    status: 'blocked',
                    code: 'multiple-open-shifts',
                    message: `Automatic clock actions are paused because ${employeeName} has multiple open shifts (${listShiftDates(openShifts)}). Fix those entries in My Timesheet first so a new punch cannot land on the wrong row.`,
                    rows: openShifts,
                };
            }

            if (olderOpen.length > 0) {
                return {
                    status: 'blocked',
                    code: 'prior-open-shift',
                    message: `Automatic clock actions are paused because ${employeeName} still has an open shift from ${formatFullDate(olderOpen[0].date)}. Add the missing clock-out on that row before recording a new punch.`,
                    rows: olderOpen,
                };
            }

            if (futureOpen.length > 0) {
                return {
                    status: 'blocked',
                    code: 'future-open-shift',
                    message: `Automatic clock actions are paused because there is an open shift dated ${formatFullDate(futureOpen[0].date)}. Please correct that row before recording a new punch.`,
                    rows: futureOpen,
                };
            }

            const candidates = getEmployeeRows(rows, employeeName).filter(row =>
                normalizeDate(row.date) === localDate &&
                !hasTimeValue(row.timeIn) &&
                !hasTimeValue(row.timeOut) &&
                !isEntryLocked(row)
            );

            if (candidates.length === 0) {
                return { status: 'ready', code: 'new-row', row: null };
            }

            if (candidates.length === 1) {
                return { status: 'ready', code: 'existing-row', row: candidates[0] };
            }

            const scheduledCandidates = candidates.filter(row => hasTimeValue(row.schedIn) || hasTimeValue(row.schedOut));
            if (scheduledCandidates.length === 1) {
                return { status: 'ready', code: 'existing-row', row: scheduledCandidates[0] };
            }

            return {
                status: 'blocked',
                code: 'ambiguous-clock-in-row',
                message: `Automatic clock-in is paused because there are multiple blank rows for ${formatFullDate(localDate)}. Please have a manager review today's schedule row before punching in.`,
                rows: candidates,
            };
        };

        const hasOpenShiftForToday = (rows, employeeName) => {
            if (!employeeName) return false;
            const todayKey = normalizeDate(new Date());
            return getOpenShiftRowsForEmployee(rows, employeeName).some(row => normalizeDate(row.date) === todayKey);
        };

        const resolveClockOutPlan = (rows, employeeName, localDate) => {
            const openShifts = getOpenShiftRowsForEmployee(rows, employeeName);
            const sameDayOpen = openShifts.filter(row => normalizeDate(row.date) === localDate);
            const olderOpen = openShifts.filter(row => normalizeDate(row.date) < localDate);
            const futureOpen = openShifts.filter(row => normalizeDate(row.date) > localDate);

            if (sameDayOpen.length === 1 && openShifts.length === 1) {
                return { status: 'ready', code: 'exact-open-shift', row: sameDayOpen[0] };
            }

            if (openShifts.length === 0) {
                return {
                    status: 'blocked',
                    code: 'no-open-shift',
                    message: `No open shift was found for ${formatFullDate(localDate)}.`,
                    rows: [],
                };
            }

            if (sameDayOpen.length > 1 || openShifts.length > 1) {
                return {
                    status: 'blocked',
                    code: 'multiple-open-shifts',
                    message: `Automatic clock-out is paused because ${employeeName} has multiple open shifts (${listShiftDates(openShifts)}). This keeps a clock-out from being saved on the wrong day.`,
                    rows: openShifts,
                };
            }

            if (olderOpen.length === 1 && sameDayOpen.length === 0) {
                return {
                    status: 'blocked',
                    code: 'prior-open-shift',
                    message: `Automatic clock-out is paused because the only open shift for ${employeeName} is on ${formatFullDate(olderOpen[0].date)}. Correct that row in My Timesheet instead of clocking out on today's screen.`,
                    rows: olderOpen,
                };
            }

            if (futureOpen.length === 1 && sameDayOpen.length === 0) {
                return {
                    status: 'blocked',
                    code: 'future-open-shift',
                    message: `Automatic clock-out is paused because the only open shift for ${employeeName} is dated ${formatFullDate(futureOpen[0].date)}. Correct that row before recording another punch.`,
                    rows: futureOpen,
                };
            }

            return {
                status: 'blocked',
                code: 'ambiguous-clock-out-row',
                message: `Automatic clock-out is paused because the open shift could not be matched to ${formatFullDate(localDate)}.`,
                rows: openShifts,
            };
        };

        const normalizeTimeInputWithPeriod = (value, currentPeriod = '') => {
            const digits = String(value || '').replace(/\D/g, '').slice(0, 4);
            if (digits.length === 0) return { time: '', period: currentPeriod };
            if (digits.length <= 2) return { time: digits, period: currentPeriod };
            if (digits.length === 3) return { time: `${digits.slice(0, 1)}:${digits.slice(1)}`, period: currentPeriod };

            const hour24 = parseInt(digits.slice(0, 2), 10);
            const minutes = digits.slice(2);
            if (!isNaN(hour24) && hour24 >= 0 && hour24 <= 23) {
                const period = hour24 >= 12 ? 'PM' : 'AM';
                const hour12 = (hour24 % 12) || 12;
                return { time: `${hour12}:${minutes}`, period };
            }
            return { time: `${digits.slice(0, 2)}:${minutes}`, period: currentPeriod };
        };

        const parseTimeField = (value) => {
            if (!value || typeof value !== 'string') {
                return { time: '', period: '' };
            }
            const match = normalizeClockTimeText(value).match(/^(\d{1,2}):([0-5]\d)\s*(AM|PM)$/);
            if (!match) {
                return { time: '', period: '' };
            }
            const hour = parseInt(match[1], 10);
            if (hour < 1 || hour > 12) {
                return { time: '', period: '' };
            }
            return { time: `${hour}:${match[2]}`, period: match[3] };
        };

        const formatTimeField = (timeValue, periodValue) => {
            const cleanedTime = String(timeValue || '').trim();
            if (!cleanedTime) return '';
            const match = cleanedTime.match(/^(\d{1,2}):([0-5]\d)$/);
            const period = String(periodValue || '').toUpperCase();
            if (!match || (period !== 'AM' && period !== 'PM')) return null;
            const hour = parseInt(match[1], 10);
            if (hour < 1 || hour > 12) return null;
            return `${hour}:${match[2]} ${period}`;
        };

        const ADMIN_SHIFT_TEMPLATE_ACCENTS = [
            'bg-[#bfdbfe]',
            'bg-[#fde68a]',
            'bg-[#fecdd3]',
            'bg-[#bbf7d0]',
            'bg-[#ddd6fe]',
            'bg-[#fdba74]',
        ];

        const ADMIN_SHIFT_UTILITY_TEMPLATE = {
            id: 'clear-cell',
            label: 'Clear Cell',
            schedIn: '',
            schedOut: '',
            scheduleStatus: '',
            clearSchedule: true,
            accent: 'bg-[#f8fafc]',
            isBuiltIn: true,
        };

        const buildShiftTemplateId = (label = 'template') => {
            return `template-${String(label || 'template')
                .trim()
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '') || 'template'}-${Date.now()}`;
        };

        const normalizeAdminShiftTemplate = (template, index = 0) => {
            if (!template || typeof template !== 'object') return null;

            const label = String(template.label || '').trim();
            if (!label) return null;

            const parsedIn = parseTimeField(template.schedIn || '');
            const parsedOut = parseTimeField(template.schedOut || '');
            const schedIn = formatTimeField(parsedIn.time, parsedIn.period);
            const schedOut = formatTimeField(parsedOut.time, parsedOut.period);

            if (!schedIn || !schedOut) return null;

            return {
                id: String(template.id || `${buildShiftTemplateId(label)}-${index}`),
                label,
                schedIn,
                schedOut,
                scheduleStatus: normalizeAdminScheduleStatus(template.scheduleStatus),
                accent: ADMIN_SHIFT_TEMPLATE_ACCENTS[index % ADMIN_SHIFT_TEMPLATE_ACCENTS.length],
                clearSchedule: false,
            };
        };

        const normalizeAdminShiftTemplates = (templates) => {
            const seenIds = new Set();
            return (Array.isArray(templates) ? templates : [])
                .map((template, index) => normalizeAdminShiftTemplate(template, index))
                .filter(template => {
                    if (!template || seenIds.has(template.id)) return false;
                    seenIds.add(template.id);
                    return true;
                });
        };

        const getVisibleAdminShiftTemplates = (templates) => {
            return normalizeAdminShiftTemplates(templates);
        };

        const buildScheduleCellKey = (employeeName, dateValue) => {
            return `${normalizeDate(dateValue)}::${String(employeeName || '').trim()}`;
        };

        const getScheduleRowForEmployeeDate = (rows, employeeName, dateValue) => {
            const targetDate = normalizeDate(dateValue);
            const candidates = getEmployeeRows(rows, employeeName).filter(row =>
                normalizeDate(row.date) === targetDate &&
                !isEntryLocked(row)
            );

            if (candidates.length === 0) return null;
            return candidates.find(row => hasTimeValue(row.schedIn) || hasTimeValue(row.schedOut)) ||
                candidates.find(row => !hasTimeValue(row.timeIn) && !hasTimeValue(row.timeOut)) ||
                candidates[0];
        };

        const buildAdminScheduleDraftFromRow = (row, employeeName = '', dateValue = new Date()) => {
            const parsedIn = parseTimeField(row?.schedIn || '');
            const parsedOut = parseTimeField(row?.schedOut || '');
            return {
                ...buildEmptyAdminScheduleForm(employeeName || row?.name || '', dateValue || row?.date || new Date()),
                schedIn: parsedIn.time,
                schedInPeriod: parsedIn.period || 'AM',
                schedOut: parsedOut.time,
                schedOutPeriod: parsedOut.period || 'PM',
                scheduleStatus: normalizeAdminScheduleStatus(row?.scheduleStatus),
                clearSchedule: false,
                sourceRow: row || null,
            };
        };

        const normalizeAdminScheduleDraftForComparison = (draft) => {
            if (!draft) {
                return {
                    name: '',
                    date: '',
                    schedIn: '',
                    schedOut: '',
                    scheduleStatus: '',
                    clearSchedule: false,
                };
            }

            const normalizedSchedIn = String(draft.schedIn || '').trim();
            const normalizedSchedOut = String(draft.schedOut || '').trim();

            return {
                name: String(draft.name || '').trim(),
                date: normalizeDate(draft.date),
                schedIn: draft.clearSchedule ? '' : normalizedSchedIn,
                schedInPeriod: draft.clearSchedule || !normalizedSchedIn ? '' : String(draft.schedInPeriod || '').trim().toUpperCase(),
                schedOut: draft.clearSchedule ? '' : normalizedSchedOut,
                schedOutPeriod: draft.clearSchedule || !normalizedSchedOut ? '' : String(draft.schedOutPeriod || '').trim().toUpperCase(),
                scheduleStatus: draft.clearSchedule ? '' : normalizeAdminScheduleStatus(draft.scheduleStatus),
                clearSchedule: Boolean(draft.clearSchedule),
            };
        };

        const areAdminScheduleDraftsEquivalent = (a, b) => {
            const normalizedA = normalizeAdminScheduleDraftForComparison(a);
            const normalizedB = normalizeAdminScheduleDraftForComparison(b);
            return normalizedA.name === normalizedB.name &&
                normalizedA.date === normalizedB.date &&
                normalizedA.schedIn === normalizedB.schedIn &&
                normalizedA.schedInPeriod === normalizedB.schedInPeriod &&
                normalizedA.schedOut === normalizedB.schedOut &&
                normalizedA.schedOutPeriod === normalizedB.schedOutPeriod &&
                normalizedA.scheduleStatus === normalizedB.scheduleStatus &&
                normalizedA.clearSchedule === normalizedB.clearSchedule;
        };

        const isExpectedScheduleCellCleared = (rows, payload) => {
            const row = getScheduleRowForEmployeeDate(rows, payload?.name, payload?.date);
            if (!row) return true;
            return !hasTimeValue(row.schedIn) &&
                !hasTimeValue(row.schedOut) &&
                !String(row.scheduleStatus || '').trim();
        };

        const parseEditHistory = (reasonText) => {
            if (!reasonText || typeof reasonText !== 'string') return [];
            return reasonText
                .split(/\s*\|\s*(?=\[Edit )/g)
                .map(chunk => chunk.trim())
                .filter(Boolean)
                .map(chunk => {
                    const match = chunk.match(/^\[Edit ([^\]]+)\]:\s*([\s\S]*)$/);
                    if (match) {
                        return {
                            timestamp: match[1].trim(),
                            note: match[2].trim(),
                        };
                    }
                    return { timestamp: '', note: chunk };
                });
        };

        const formatHistoryTimestamp = (rawTimestamp) => {
            if (!rawTimestamp || typeof rawTimestamp !== 'string') return '';
            const parsed = new Date(rawTimestamp);
            if (isNaN(parsed.getTime())) return rawTimestamp.trim();
            return parsed.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true,
            });
        };

        const parseReasonCell = (reasonText) => {
            if (!reasonText || typeof reasonText !== 'string') return [];
            const trimmed = reasonText.trim();
            if (!trimmed) return [];

            // Preferred format: JSON array in one spreadsheet cell
            try {
                const parsed = JSON.parse(trimmed);
                if (Array.isArray(parsed)) {
                    return parsed
                        .map(item => {
                            if (!item || typeof item !== 'object') return null;
                            const rawTimestamp = typeof item.t === 'string'
                                ? item.t
                                : (typeof item.timestamp === 'string' ? item.timestamp : '');
                            const note = typeof item.n === 'string'
                                ? item.n
                                : (typeof item.note === 'string' ? item.note : '');
                            const editor = typeof item.by === 'string'
                                ? item.by
                                : (typeof item.editor === 'string'
                                    ? item.editor
                                    : (typeof item.byName === 'string' ? item.byName : ''));
                            if (!note.trim()) return null;
                            return {
                                timestamp: formatHistoryTimestamp(rawTimestamp),
                                rawTimestamp,
                                editor: editor.trim(),
                                note: note.trim(),
                            };
                        })
                        .filter(Boolean);
                }
            } catch (_) {}

            // Backward-compatible fallback for legacy pipe-delimited entries
            return parseEditHistory(trimmed).map(entry => ({
                timestamp: entry.timestamp,
                rawTimestamp: entry.timestamp,
                editor: '',
                note: entry.note,

        };

        // --- SUB-COMPONENTS ---

        const PinPad = ({ pinInput, handlePinPress, handlePinBackspace, handlePinClear, selectedEmployee, onCancel }) => (

                <button onClick={onCancel} className="mt-3 md:mt-5 text-gray-500 hover:text-[#060606] font-bold flex items-center gap-2 px-4 py-2 transition-colors lg:hidden shrink-0 text-sm">

        const PersonalDashboard = ({

            actionAlertPlan,
            onClockAction,
            canClockIn,
            canClockOut,
            isSubmittingAction,

            const visibleData = filterTimesheetRowsUpToToday(personalData);

            return (
                <div className="panel-content-5 flex flex-col h-full animate-fade-in relative overflow-hidden">
                    <div className="flex justify-between items-center mb-4 md:mb-6 shrink-0">
                        <h3 className="text-xl md:text-2xl font-bold font-poppins text-[#060606]">My Timesheet</h3>
                        <div className="flex items-center gap-4">
                            {isFetchingLogs && <span className="text-[10px] md:text-sm font-bold text-[#38bdf8]"><i className="fas fa-sync fa-spin mr-1"></i> Syncing...</span>}
                        </div>
                    </div>

                    {actionAlertPlan && (
                        <div className="mb-4 rounded-xl border-2 border-black bg-[#fee2e2] px-4 py-3 shadow-[4px_4px_0px_0px_#000000]">
                            <div className="flex items-start gap-3">
                                <i className="fas fa-shield-alt text-[#dc2626] text-lg mt-0.5"></i>
                                <p className="text-xs md:text-sm font-bold text-[#060606] leading-relaxed">{actionAlertPlan.message}</p>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-2 gap-3 mb-4 md:mb-6 shrink-0">
                        <button
                            onClick={() => onClockAction("CLOCK_IN")}
                            disabled={!canClockIn}
                            className={`brutal-btn py-3 md:py-4 text-sm md:text-base flex flex-col items-center justify-center gap-2 ${
                                !canClockIn ? 'bg-gray-200 text-gray-500' : 'bg-[#4ade80] hover:bg-[#22c55e]'
                            }`}
                        >
                            <i className={`fas ${isSubmittingAction ? 'fa-circle-notch spinner' : 'fa-sign-in-alt'} text-lg md:text-2xl`}></i>
                            <span>{isSubmittingAction ? 'Saving...' : 'Clock In'}</span>
                        </button>
                        <button
                            onClick={() => onClockAction("CLOCK_OUT")}
                            disabled={!canClockOut}
                            className={`brutal-btn py-3 md:py-4 text-sm md:text-base flex flex-col items-center justify-center gap-2 ${
                                !canClockOut ? 'bg-gray-200 text-gray-500' : 'bg-[#fb7185] hover:bg-[#f43f5e]'
                            }`}
                        >
                            <i className={`fas ${isSubmittingAction ? 'fa-circle-notch spinner' : 'fa-sign-out-alt'} text-lg md:text-2xl`}></i>
                            <span>{isSubmittingAction ? 'Saving...' : 'Clock Out'}</span>
                        </button>
                    </div>
                    
                    {/* Inner padding specifically to prevent shadow clipping */}
                    <div className="flex-1 overflow-y-auto no-scrollbar space-y-4 pb-4 pt-1 pl-1 pr-3 md:pr-4">
                        {visibleData.length === 0 ? (
                            <div className="p-8 text-center text-gray-400 font-bold text-sm md:text-lg border-2 border-dashed border-gray-300 rounded-xl">No records found</div>
                        ) : (
                            visibleData.map((row, idx) => {
                                const dateObj = parseLocalDate(row.date);
                                const dayName = isNaN(dateObj) ? '???' : dateObj.toLocaleDateString('en-US', { weekday: 'short' });
                                const dayNum = isNaN(dateObj) ? '??' : dateObj.getDate();
                                const monthName = isNaN(dateObj) ? '???' : dateObj.toLocaleDateString('en-US', { month: 'short' });
                                const isLocked = isEntryLocked(row);
                                const hasEdits = parseReasonCell(row.reason).length > 0;

                                return (
                                    <div key={idx} className={`flex flex-row rounded-xl md:rounded-2xl border-2 border-black shadow-[4px_4px_0px_0px_#000000] overflow-hidden ${isLocked ? 'bg-gray-50 opacity-80' : 'bg-white'}`}>
                                        
                                        {/* Date Block (Lavender) */}

                                                    <span className={`font-bold font-poppins text-sm md:text-lg ${isLocked ? 'text-gray-600' : 'text-[#f43f5e]'}`}>{row.timeOut || '-'}</span>
                                                </div>
                                                <div className="flex flex-col">
                                                    <span className="text-[10px] md:text-xs font-bold text-gray-500 uppercase">Total</span>
                                                    <span className="font-bold font-poppins text-sm md:text-lg text-[#060606]">{calculateHours(row.timeIn, row.timeOut)}</span>
                                                </div>
                                            </div>

                                            {/* Action Button */}
                                            <div className="absolute top-2 right-2 md:static md:flex items-center justify-center shrink-0">
                                                {isLocked ? (

                                                        {hasEdits && (

                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>
                </div>
            );
        };

        const EditForm = ({ editTarget, editForm, setEditForm, saveEdit, reasonValidationTriggered, onPrev, onNext, canPrev, canNext, onClose, isSubmitting }) => {
            const historyRows = parseReasonCell(editForm.oldReason);
            const isReasonInvalid = reasonValidationTriggered && !editForm.newReason.trim();

            return (
            <div className="h-full flex flex-col animate-fade-in overflow-hidden relative">
                <div className="p-4 md:p-6 border-b-3 border-black flex flex-col md:flex-row justify-between items-center bg-[#fde047] gap-4 mb-4 md:mb-6 shrink-0">
                    <div>
                        <h3 className="text-2xl font-bold font-poppins text-[#060606] text-center md:text-left">Edit Entry</h3>
                    </div>

                    <div className="flex items-center gap-4 bg-white border-2 border-black rounded-xl p-1 shadow-[2px_2px_0px_0px_#000000]">
                        <button onClick={onPrev} disabled={!canPrev} className={`w-10 h-10 flex items-center justify-center rounded-lg text-[#060606] transition-colors font-bold font-poppins text-lg ${canPrev ? 'hover:bg-gray-100' : 'opacity-40 cursor-not-allowed'}`}>
                            <i className="fas fa-chevron-left"></i>
                        </button>
                        <span className="font-bold font-poppins text-[#060606] w-24 text-center text-lg">
                            {formatMonthDayDate(editTarget.date)}
                        </span>
                        <button onClick={onNext} disabled={!canNext} className={`w-10 h-10 flex items-center justify-center rounded-lg text-[#060606] transition-colors font-bold font-poppins text-lg ${canNext ? 'hover:bg-gray-100' : 'opacity-40 cursor-not-allowed'}`}>
                            <i className="fas fa-chevron-right"></i>
                        </button>
                    </div>

                    <button onClick={onClose} className="brutal-btn w-12 h-12 bg-white flex items-center justify-center text-[#060606] hover:bg-gray-100 text-xl absolute md:relative top-4 right-4 md:top-auto md:right-auto">
                        <i className="fas fa-times"></i>
                    </button>
                </div>

                {/* Padding to prevent input shadow clipping */}
                <div className="space-y-3 md:space-y-4 flex-1 overflow-y-auto no-scrollbar pb-4 pt-1 px-4 md:px-6">
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
                        <div>
                            <label className="block text-xs md:text-sm font-bold font-poppins text-[#060606] mb-1 md:mb-2">Time In</label>
                            <div className="w-full border-2 border-black rounded-xl bg-white overflow-hidden flex items-stretch focus-within:shadow-[4px_4px_0px_0px_#000000]">
                                <input
                                    type="text"
                                    inputMode="numeric"
                                    placeholder="8:00"
                                    value={editForm.timeIn}
                                    onChange={e => {

                                        setEditForm({ ...editForm, timeIn: next.time, timeInPeriod: next.period });

                                    className="flex-1 px-2.5 md:px-3 py-2.5 md:py-3 font-bold text-sm md:text-base bg-transparent outline-none"
                                    maxLength={5}
                                />
                                <div className="flex shrink-0 items-center gap-2 pr-2 md:pr-3">
                                    <button
                                        type="button"
                                        onClick={() => setEditForm({ ...editForm, timeInPeriod: 'AM' })}
                                        className={`text-xs md:text-sm font-bold transition-colors ${
                                            editForm.timeInPeriod === 'AM'

                                    >
                                        AM
                                    </button>
                                    <button
                                        type="button"
                                        onClick={() => setEditForm({ ...editForm, timeInPeriod: 'PM' })}
                                        className={`text-xs md:text-sm font-bold transition-colors ${
                                            editForm.timeInPeriod === 'PM'
                                                ? 'text-[#060606]'
                                                : 'text-gray-400 hover:text-gray-500'

                                        PM

                        <div>
                            <label className="block text-xs md:text-sm font-bold font-poppins text-[#060606] mb-1 md:mb-2">Time Out</label>
                            <div className="w-full border-2 border-black rounded-xl bg-white overflow-hidden flex items-stretch focus-within:shadow-[4px_4px_0px_0px_#000000]">
                                <input

                                    onChange={e => {

                                    className="flex-1 px-2.5 md:px-3 py-2.5 md:py-3 font-bold text-sm md:text-base bg-transparent outline-none"
                                    maxLength={5}

                                {historyRows.length > 0 ? (

        const EmployeeInventoryPanel = ({
            inventoryRows,
            isFetchingInventory,
            isSubmittingInventory,
            onRefresh,
            onStart,
            onFinish,
            onMessage
        }) => {
            const [drafts, setDrafts] = useState({});
            const openRows = sortInventoryRows(getOpenInventoryRows(inventoryRows));

            const updateDraft = (rowNumber, field, value) => {
                setDrafts(prev => ({
                    ...prev,
                    [rowNumber]: {
                        ...(prev[rowNumber] || {}),
                        [field]: value,
                    }
                }));
            };

            const clearDraft = (rowNumber, field) => {
                setDrafts(prev => ({
                    ...prev,
                    [rowNumber]: {
                        ...(prev[rowNumber] || {}),
                        [field]: '',
                    }
                }));
            };

            const submitAction = async (row, field, submitter) => {
                const quantity = parseWholeNumber(drafts[row.rowNumber]?.[field]);
                if (!quantity) {
                    onMessage?.({ type: 'error', message: "Enter a whole number before saving inventory progress." });
                    return;
                }

                const didSucceed = await submitter(row, quantity);
                if (didSucceed) {
                    clearDraft(row.rowNumber, field);
                }
            };

            return (
                <div className="panel-content-5 flex flex-col h-full animate-fade-in overflow-hidden">
                    <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4 md:mb-6 shrink-0">
                        <div>
                            <h3 className="text-xl md:text-2xl font-bold font-poppins text-[#060606]">Inventory Board</h3>
                            <p className="text-xs md:text-sm font-bold text-gray-500 mt-1">Start work here, then move finished pieces into Awaiting Approval.</p>
                        </div>
                        <div className="flex flex-wrap gap-2">
                            <button
                                onClick={onRefresh}
                                disabled={isFetchingInventory || isSubmittingInventory}
                                className="brutal-btn bg-white hover:bg-gray-50 px-4 py-2 text-sm flex items-center gap-2"
                            >
                                <i className={`fas ${isFetchingInventory ? 'fa-circle-notch spinner' : 'fa-rotate-right'} text-[#38bdf8]`}></i>
                                <span>{isFetchingInventory ? 'Refreshing...' : 'Refresh'}</span>
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto no-scrollbar space-y-4 pb-4 pr-1">
                        {openRows.length === 0 ? (
                            <div className="p-8 text-center text-gray-400 font-bold text-sm md:text-lg border-2 border-dashed border-gray-300 rounded-xl bg-white">
                                No active inventory needs right now.
                            </div>
                        ) : openRows.map(row => (
                            <div key={row.rowNumber} className="rounded-2xl border-2 border-black bg-white p-4 md:p-5 shadow-[4px_4px_0px_0px_#000000]">

                                    <div>
                                        <div className="text-[10px] uppercase font-bold text-gray-500">SKU</div>
                                        <div className="text-xs font-bold uppercase tracking-[0.2em] text-[#0284c7] mt-1">{getInventorySkuText(row)}</div>
                                        <div className="text-[10px] uppercase font-bold text-gray-500 mt-3">Name</div>
                                        <h4 className="text-lg md:text-xl font-bold font-poppins text-[#060606] mt-1">{getInventoryNameText(row)}</h4>
                                    </div>
                                    <div className="inline-flex items-center rounded-full border-2 border-black bg-[#fef3c7] px-3 py-1 text-xs font-bold uppercase tracking-wide">

                                    </div>
                                </div>

                                <div className="grid grid-cols-2 lg:grid-cols-5 gap-3 mt-4">
                                    <div className="rounded-xl border-2 border-black bg-[#f5f3ff] px-3 py-2">
                                        <div className="text-[10px] uppercase font-bold text-gray-500">Needed</div>
                                        <div className="text-lg font-bold font-poppins">{row.needed}</div>
                                    </div>
                                    <div className="rounded-xl border-2 border-black bg-[#ecfccb] px-3 py-2">
                                        <div className="text-[10px] uppercase font-bold text-gray-500">In Process</div>
                                        <div className="text-lg font-bold font-poppins">{row.inProcess}</div>
                                    </div>
                                    <div className="rounded-xl border-2 border-black bg-[#fef3c7] px-3 py-2">
                                        <div className="text-[10px] uppercase font-bold text-gray-500">Awaiting Approval</div>
                                        <div className="text-lg font-bold font-poppins">{row.awaitingApproval}</div>
                                    </div>
                                    <div className="rounded-xl border-2 border-black bg-[#d1fae5] px-3 py-2">
                                        <div className="text-[10px] uppercase font-bold text-gray-500">Approved</div>
                                        <div className="text-lg font-bold font-poppins">{row.addedToStore}</div>
                                    </div>
                                    <div className="rounded-xl border-2 border-black bg-[#fee2e2] px-3 py-2">
                                        <div className="text-[10px] uppercase font-bold text-gray-500">Still Needed</div>
                                        <div className="text-lg font-bold font-poppins">{row.stillNeeded}</div>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-2 gap-3 mt-4">

                                                type="number"

                                                Finish

                                        </div>
                                    </div>

                                    Updated {formatInventoryTimestamp(row.lastUpdated)}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>

        };

        const PublishedSchedulePanel = ({
            sheetData,
            title = 'Published Schedule',
            subtitle = 'Current week - published shifts only',
            highlightName = '',
            compact = false,
        }) => {
            const [currentWeekStart, setCurrentWeekStart] = useState(getWeekStartDate(new Date()));
            const weekDays = Array.from({ length: 7 }).map((_, i) => {
                const day = new Date(currentWeekStart);
                day.setDate(day.getDate() + i);
                return day;
            });
            const publishedRows = sheetData
                .filter(row => (hasTimeValue(row.schedIn) || hasTimeValue(row.schedOut)) && isPublishedSchedule(row))
                .slice()
                .sort((a, b) => {
                    const dateCompare = normalizeDate(a.date).localeCompare(normalizeDate(b.date));
                    if (dateCompare !== 0) return dateCompare;
                    const timeCompare = (parseClockTimeToMinutes(a.schedIn) || 0) - (parseClockTimeToMinutes(b.schedIn) || 0);
                    if (timeCompare !== 0) return timeCompare;
                    return String(a.name || '').localeCompare(String(b.name || ''));
                });

            const formatShortDate = (dateValue) => {
                return parseLocalDate(dateValue).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            };

            return (
                <div className="flex flex-col h-full animate-fade-in overflow-hidden">

                            <h3 className="text-xl md:text-2xl font-bold font-poppins text-[#060606]">{title}</h3>
                            <p className="text-xs md:text-sm font-bold text-gray-500 mt-1">{subtitle}</p>
                        </div>
                        <div className="flex items-center gap-2 bg-white border-2 border-black rounded-xl p-1 shadow-[2px_2px_0px_0px_#000000] h-12">

                                const next = new Date(prev);
                                next.setDate(next.getDate() - 7);
                                return next;
                            })} className="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 text-[#060606] transition-colors font-bold font-poppins text-lg">
                                <i className="fas fa-chevron-left"></i>
                            </button>
                            <span className="font-bold font-poppins text-[#060606] min-w-[170px] md:min-w-[210px] text-center text-sm md:text-base px-2">
                                {formatShortDate(currentWeekStart)} - {formatShortDate(weekDays[6])}
                            </span>
                            <button onClick={() => setCurrentWeekStart(prev => {
                                const next = new Date(prev);
                                next.setDate(next.getDate() + 7);
                                return next;
                            })} className="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 text-[#060606] transition-colors font-bold font-poppins text-lg">
                                <i className="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto no-scrollbar px-1 pt-1 pb-4">
                        <div className={`grid grid-cols-1 ${compact ? '2xl:grid-cols-7 xl:grid-cols-4' : 'lg:grid-cols-7'} gap-3`}>
                            {weekDays.map(dayObj => {
                                const dayKey = normalizeDate(dayObj);
                                const dayShifts = publishedRows.filter(row => normalizeDate(row.date) === dayKey);
                                const isToday = dayKey === normalizeDate(new Date());

                                return (
                                    <div key={dayKey} className={`flex flex-row ${compact ? 'xl:flex-col' : 'lg:flex-col'} rounded-2xl border-2 border-black overflow-hidden shadow-[4px_4px_0px_0px_#000000] ${isToday ? 'bg-[#e0f2fe]' : 'bg-white'}`}>
                                        <div className={`p-2.5 ${compact ? 'xl:w-full xl:border-b-2 xl:border-r-0' : 'lg:w-full lg:border-b-2 lg:border-r-0'} border-r-2 border-black w-24 shrink-0 flex flex-col justify-center items-center ${isToday ? 'bg-[#38bdf8] text-[#060606]' : 'bg-gray-50 text-[#060606]'}`}>
                                            <div className="text-[11px] md:text-sm font-bold font-poppins uppercase tracking-wider">
                                                {dayObj.toLocaleDateString('en-US', { weekday: 'short' })}

                                            <div className="text-xl md:text-2xl font-bold font-poppins mt-1">
                                                {dayObj.getDate()}

                                            <div className="text-[10px] md:text-xs font-bold uppercase mt-0.5">
                                                {dayObj.toLocaleDateString('en-US', { month: 'short' })}
                                            </div>
                                        </div>

                                            {dayShifts.length > 0 ? dayShifts.map((shift, idx) => {

                                                return (
                                                    <div key={`${dayKey}-${shift.name}-${idx}`} className={`rounded-xl border-2 border-black px-3 py-2.5 shadow-[2px_2px_0px_0px_#000000] ${isHighlighted ? 'bg-[#dbeafe]' : 'bg-white'}`}>
                                                        <div className="flex items-start justify-between gap-3">
                                                            <div className="font-bold font-poppins text-[#060606] text-sm md:text-base leading-tight">
                                                                {shift.name}
                                                            </div>
                                                            {isHighlighted && (
                                                                <span className="text-[10px] uppercase font-bold tracking-wide text-[#0284c7]">You</span>
                                                            )}
                                                        </div>
                                                        <div className="text-[11px] md:text-sm font-bold text-gray-600 mt-1.5">
                                                            <i className="far fa-clock mr-1 text-[#fb7185]"></i>
                                                            {shift.schedIn} - {shift.schedOut}
                                                        </div>
                                                    </div>
                                                );
                                            }) : (
                                                <div className="flex items-center justify-start h-full text-sm text-gray-400 font-bold italic px-1">
                                                    No published shifts
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const TodaySchedulePanel = ({
            sheetData,
            title = '',
            subtitle = '',
        }) => {
            const todayKey = normalizeDate(new Date());
            const todayDate = parseLocalDate(todayKey);
            const todayShifts = (Array.isArray(sheetData) ? sheetData : [])
                .filter(row =>
                    normalizeDate(row?.date) === todayKey &&
                    (hasTimeValue(row?.schedIn) || hasTimeValue(row?.schedOut)) &&
                    isPublishedSchedule(row)
                )
                .slice()
                .sort((a, b) => {
                    const timeCompare = (parseClockTimeToMinutes(a.schedIn) || 0) - (parseClockTimeToMinutes(b.schedIn) || 0);
                    if (timeCompare !== 0) return timeCompare;
                    return String(a.name || '').localeCompare(String(b.name || ''));
                });

            return (
                <div className="flex flex-col h-full min-h-0 animate-fade-in">
                    {(title || subtitle) && (
                        <div className="mb-4 shrink-0">
                            {title && <h3 className="text-xl md:text-2xl font-bold font-poppins text-[#060606]">{title}</h3>}
                            {subtitle && <p className="text-xs md:text-sm font-bold text-gray-500 mt-1">{subtitle}</p>}

                    <div className="flex-1 overflow-y-auto no-scrollbar shadow-safe-4 pb-4">
                        <div className="panel-card-grid">

                                            {todayDate.getDate()}

                                            </div>
                                            <div className="text-[10px] md:text-xs font-bold text-gray-600 mt-1">
                                                <i className="far fa-clock mr-1 text-[#fb7185]"></i>
                                                {shift.schedIn} - {shift.schedOut}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>

            inventoryRows,
            title = 'Inventory',
            subtitle = '',
        }) => {
            const openRows = sortInventoryRows(getOpenInventoryRows(inventoryRows));

            return (
                <div className="panel-content-5 flex flex-col h-full min-h-0 animate-fade-in">
                    <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-3 shrink-0">
                        <div>
                            <h3 className="text-xl md:text-2xl font-bold font-poppins text-[#060606]">{title}</h3>
                            {subtitle && <p className="text-xs md:text-sm font-bold text-gray-500 mt-1">{subtitle}</p>}

                        <div className="rounded-full border-2 border-black bg-[#fef3c7] px-3 py-1 text-xs font-bold uppercase tracking-wide self-start md:self-auto">
                            {openRows.length} open

                            <div className="panel-card-grid">
                                {openRows.map(row => (
                                    <div key={row.rowNumber} className="panel-card-width rounded-xl border-2 border-black bg-white p-2.5 shadow-[3px_3px_0px_0px_#000000]">

                                            <div className="min-w-0 flex-1">
                                                <div className="text-[9px] uppercase font-bold text-gray-500">SKU</div>
                                                <div className="text-[10px] font-bold uppercase tracking-[0.18em] text-[#0284c7] mt-1 break-words">
                                                    {getInventorySkuText(row)}
                                                </div>
                                            </div>

                                        </div>

                                        <div className="mt-2.5">
                                            <div className="text-[9px] uppercase font-bold text-gray-500">Name</div>

                                                <div className="text-[9px] uppercase font-bold text-gray-500">Awaiting</div>

                                            Updated {formatInventoryTimestamp(row.lastUpdated)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );

        const PublicOverviewPanel = ({ sheetData, inventoryRows }) => {
            return (
                <div className="flex flex-col h-full animate-fade-in overflow-hidden">
