                    </div>

                    <div className="flex flex-col gap-4 min-h-0 flex-1 overflow-y-auto no-scrollbar shadow-safe-4 pt-1 pb-4 pr-2">
                        <div className="rounded-2xl border-2 border-black bg-[#f8fafc] p-3 md:p-4 shadow-[4px_4px_0px_0px_#000000] min-h-[220px] overflow-visible">
                            <TodaySchedulePanel sheetData={sheetData} />
                        </div>
                        <div className="rounded-2xl border-2 border-black bg-[#fff7ed] p-3 md:p-4 shadow-[4px_4px_0px_0px_#000000] min-h-[280px] overflow-visible">
                            <InventorySnapshotPanel
                                inventoryRows={inventoryRows}
                                title="Inventory"
                            />
                        </div>
                    </div>
                </div>
            );
        };

        const AdminInventoryWorkspace = ({
            adminUser,
            inventoryRows,
            isFetchingInventory,
            isSubmittingInventory,
            onRefresh,
            onAddNeed,
            onAdjustNeed,
            onApprove,
            onReject,
            onOpenScheduler,
            onSignOut,
            onMessage
        }) => {
            const [createForm, setCreateForm] = useState({ sku: '', product: '', quantity: '' });
            const [drafts, setDrafts] = useState({});
            const openRows = sortInventoryRows(getOpenInventoryRows(inventoryRows));
            const awaitingCount = openRows.filter(row => Number(row.awaitingApproval || 0) > 0).length;

            const updateDraft = (rowNumber, field, value) => {
                setDrafts(prev => ({
                    ...prev,
                    [rowNumber]: {
                        ...(prev[rowNumber] || {}),
                        [field]: value,
                    }
                }));
            };

            const clearDraft = (rowNumber, field) => {
                setDrafts(prev => ({
                    ...prev,
                    [rowNumber]: {
                        ...(prev[rowNumber] || {}),
                        [field]: '',
                    }
                }));
            };

            const submitRowAction = async (row, field, submitter, options = {}) => {
                const quantity = parseWholeNumber(drafts[row.rowNumber]?.[field], { allowNegative: Boolean(options.allowNegative) });
                if (quantity === null) {
                    onMessage?.({ type: 'error', message: options.invalidMessage || "Enter a whole number before saving this inventory change." });
                    return;
                }

                const didSucceed = await submitter(row, quantity);
                if (didSucceed) {
                    clearDraft(row.rowNumber, field);
                }
            };

            const submitCreate = async () => {
                const sku = String(createForm.sku || '').trim().toUpperCase();
                const product = String(createForm.product || '').trim();
                const quantity = parseWholeNumber(createForm.quantity);
                if (!sku || !product || !quantity) {
                    onMessage?.({ type: 'error', message: "Enter a SKU, Name, and whole-number Need Qty." });
                    return;
                }

                const didSucceed = await onAddNeed(sku, product, quantity);
                if (didSucceed) {
                    setCreateForm({ sku: '', product: '', quantity: '' });
                }
            };

            return (
                <div className="panel-content-5 flex flex-col h-full animate-fade-in overflow-hidden">
                    <div className="flex flex-col xl:flex-row xl:items-start xl:justify-between gap-4 mb-4 shrink-0">
                        <div>
                            <div className="text-xs font-bold uppercase tracking-[0.2em] text-[#0284c7]">Admin Inventory</div>
                            <h3 className="text-2xl md:text-3xl font-bold font-poppins text-[#060606] mt-1">Inventory Management</h3>
                            <p className="text-sm font-bold text-gray-600 mt-1">Hi, {adminUser?.name}</p>
                        </div>
                        <div className="flex flex-wrap gap-2">
                            <button
                                onClick={onOpenScheduler}
                                className="brutal-btn bg-[#38bdf8] hover:bg-[#0ea5e9] px-4 py-2 text-sm flex items-center gap-2"
                            >
                                <i className="fas fa-calendar-week"></i>
                                <span>Schedule</span>
                            </button>
                            <button
                                onClick={onRefresh}
                                disabled={isFetchingInventory || isSubmittingInventory}
                                className="brutal-btn bg-white hover:bg-gray-50 px-4 py-2 text-sm flex items-center gap-2"
                            >
                                <i className={`fas ${isFetchingInventory ? 'fa-circle-notch spinner' : 'fa-rotate-right'} text-[#38bdf8]`}></i>
                                <span>{isFetchingInventory ? 'Refreshing...' : 'Refresh'}</span>
                            </button>
                            <button
                                onClick={onSignOut}
                                className="brutal-btn bg-white hover:bg-gray-50 px-4 py-2 text-sm flex items-center gap-2"
                            >
                                <i className="fas fa-user-lock text-[#f43f5e]"></i>
                                <span>Sign Out</span>
                            </button>
                        </div>
                    </div>

                    <div className="grid lg:grid-cols-[360px_minmax(0,1fr)] gap-4 min-h-0 flex-1">
                        <div className="space-y-4">
                            <div className="brutal-card bg-white p-4 md:p-5">
                                <div className="flex items-start justify-between gap-3">
                                    <div>
                                        <h4 className="text-lg font-bold font-poppins text-[#060606]">Add Inventory Need</h4>
                                        <p className="text-xs font-bold text-gray-500 mt-1">Add a new SKU and product name, or increase an open row.</p>
                                    </div>
                                    <div className="rounded-full border-2 border-black bg-[#fef3c7] px-3 py-1 text-xs font-bold uppercase">
                                        {awaitingCount} awaiting
                                    </div>
                                </div>
                                <div className="space-y-3 mt-4">
                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-wide text-[#060606] mb-2">SKU</label>
                                        <input
                                            type="text"
                                            value={createForm.sku}
                                            onChange={e => setCreateForm(prev => ({ ...prev, sku: e.target.value.toUpperCase() }))}
                                            className="brutal-input w-full px-3 py-2 text-sm"
                                            placeholder="Enter SKU"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-wide text-[#060606] mb-2">Name</label>
                                        <input
                                            type="text"
                                            value={createForm.product}
                                            onChange={e => setCreateForm(prev => ({ ...prev, product: e.target.value }))}
                                            className="brutal-input w-full px-3 py-2 text-sm"
                                            placeholder="Enter product name"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-wide text-[#060606] mb-2">Need Qty</label>
                                        <input
                                            type="number"
                                            min="1"
                                            step="1"
                                            value={createForm.quantity}
                                            onChange={e => setCreateForm(prev => ({ ...prev, quantity: e.target.value }))}
                                            className="brutal-input w-full px-3 py-2 text-sm"
                                            placeholder="How many should be made?"
                                        />
                                    </div>
                                    <button
                                        onClick={submitCreate}
                                        disabled={isSubmittingInventory}
                                        className="brutal-btn w-full bg-[#4ade80] hover:bg-[#22c55e] px-4 py-3 text-sm flex items-center justify-center gap-2"
                                    >
                                        <i className={`fas ${isSubmittingInventory ? 'fa-circle-notch spinner' : 'fa-plus'}`}></i>
                                        <span>{isSubmittingInventory ? 'Saving...' : 'Add Need'}</span>
                                    </button>
                                </div>
                            </div>

                            <div className="brutal-card bg-white p-4 md:p-5">
                                <h4 className="text-lg font-bold font-poppins text-[#060606]">What This Means</h4>
                                <div className="space-y-2 mt-4 text-sm font-bold text-gray-600">
                                    <div>`Still Needed` is what has not been claimed, finished, or approved yet.</div>
                                    <div>`Awaiting Approval` is finished work that still needs your review.</div>
                                    <div>`Approved` is what has already been reviewed and approved by admin.</div>
                                </div>
                            </div>
                        </div>

                        <div className="min-h-0 overflow-y-auto no-scrollbar pr-1 space-y-4">
                            {openRows.length === 0 ? (
                                <div className="p-10 text-center text-gray-400 font-bold text-sm md:text-lg border-2 border-dashed border-gray-300 rounded-xl bg-white">
                                    No active inventory rows are open.
                                </div>
                            ) : openRows.map(row => (
                                <div key={row.rowNumber} className="rounded-2xl border-2 border-black bg-white p-4 md:p-5 shadow-[4px_4px_0px_0px_#000000]">
                                    <div className="flex flex-col xl:flex-row xl:items-start xl:justify-between gap-4">
                                        <div>
                                            <div className="text-[10px] uppercase font-bold text-gray-500">SKU</div>
                                            <div className="text-xs font-bold uppercase tracking-[0.2em] text-[#0284c7] mt-1">{getInventorySkuText(row)}</div>
                                            <div className="text-[10px] uppercase font-bold text-gray-500 mt-3">Name</div>
                                            <h4 className="text-lg md:text-xl font-bold font-poppins text-[#060606] mt-1">{getInventoryNameText(row)}</h4>
                                            <div className="text-[11px] md:text-xs font-bold uppercase tracking-wide text-gray-500 mt-2">Updated {formatInventoryTimestamp(row.lastUpdated)}</div>
                                        </div>
                                        <div className="inline-flex items-center rounded-full border-2 border-black bg-[#fef3c7] px-3 py-1 text-xs font-bold uppercase tracking-wide">
                                            {row.status}
                                        </div>
                                    </div>

                                    <div className="grid sm:grid-cols-2 xl:grid-cols-5 gap-3 mt-4">
                                        <div className="rounded-xl border-2 border-black bg-[#f5f3ff] px-3 py-2">
                                            <div className="text-[10px] uppercase font-bold text-gray-500">Needed</div>
                                            <div className="text-lg font-bold font-poppins">{row.needed}</div>
                                        </div>
                                        <div className="rounded-xl border-2 border-black bg-[#ecfccb] px-3 py-2">
                                            <div className="text-[10px] uppercase font-bold text-gray-500">In Process</div>
                                            <div className="text-lg font-bold font-poppins">{row.inProcess}</div>
                                        </div>
                                        <div className="rounded-xl border-2 border-black bg-[#fef3c7] px-3 py-2">
                                            <div className="text-[10px] uppercase font-bold text-gray-500">Awaiting Approval</div>
                                            <div className="text-lg font-bold font-poppins">{row.awaitingApproval}</div>
                                        </div>
                                        <div className="rounded-xl border-2 border-black bg-[#d1fae5] px-3 py-2">
                                            <div className="text-[10px] uppercase font-bold text-gray-500">Approved</div>
                                            <div className="text-lg font-bold font-poppins">{row.addedToStore}</div>
                                        </div>
                                        <div className="rounded-xl border-2 border-black bg-[#fee2e2] px-3 py-2">
                                            <div className="text-[10px] uppercase font-bold text-gray-500">Still Needed</div>
                                            <div className="text-lg font-bold font-poppins">{row.stillNeeded}</div>
                                        </div>
                                    </div>

                                    <div className="grid xl:grid-cols-3 gap-3 mt-4">
                                        <div className="rounded-xl border-2 border-black bg-[#eff6ff] p-3">
                                            <label className="block text-xs font-bold uppercase tracking-wide text-[#060606] mb-2">Adjust Needed</label>
                                            <div className="flex gap-2">
                                                <input
                                                    type="number"
                                                    step="1"
                                                    value={drafts[row.rowNumber]?.adjust || ''}
                                                    onChange={e => updateDraft(row.rowNumber, 'adjust', e.target.value)}
                                                    className="brutal-input w-full px-3 py-2 text-sm"
                                                    placeholder="Use -2 or +5"
                                                />
                                                <button
                                                    onClick={() => submitRowAction(row, 'adjust', onAdjustNeed, { allowNegative: true, invalidMessage: "Enter a whole-number adjustment like 5 or -2." })}
                                                    disabled={isSubmittingInventory}
                                                    className="brutal-btn bg-[#60a5fa] hover:bg-[#3b82f6] px-4 py-2 text-sm whitespace-nowrap"
                                                >
                                                    Save
                                                </button>
                                            </div>
                                        </div>

                                        <div className="rounded-xl border-2 border-black bg-[#f0fdf4] p-3">
                                            <label className="block text-xs font-bold uppercase tracking-wide text-[#060606] mb-2">Approve</label>
                                            <div className="flex gap-2">
                                                <input
                                                    type="number"
                                                    min="1"
                                                    step="1"
                                                    value={drafts[row.rowNumber]?.approve || ''}
                                                    onChange={e => updateDraft(row.rowNumber, 'approve', e.target.value)}
                                                    className="brutal-input w-full px-3 py-2 text-sm"
                                                    placeholder={row.awaitingApproval > 0 ? `${row.awaitingApproval} waiting` : 'Nothing waiting'}
                                                />
                                                <button
                                                    onClick={() => submitRowAction(row, 'approve', onApprove)}
                                                    disabled={isSubmittingInventory || row.awaitingApproval <= 0}
                                                    className="brutal-btn bg-[#4ade80] hover:bg-[#22c55e] px-4 py-2 text-sm whitespace-nowrap"
                                                >
                                                    Approve
                                                </button>
                                            </div>
                                        </div>

                                        <div className="rounded-xl border-2 border-black bg-[#fff7ed] p-3">
                                            <label className="block text-xs font-bold uppercase tracking-wide text-[#060606] mb-2">Send Back</label>
                                            <div className="flex gap-2">
                                                <input
                                                    type="number"
                                                    min="1"
                                                    step="1"
                                                    value={drafts[row.rowNumber]?.reject || ''}
                                                    onChange={e => updateDraft(row.rowNumber, 'reject', e.target.value)}
                                                    className="brutal-input w-full px-3 py-2 text-sm"
                                                    placeholder={row.awaitingApproval > 0 ? `${row.awaitingApproval} waiting` : 'Nothing waiting'}
                                                />
                                                <button
                                                    onClick={() => submitRowAction(row, 'reject', onReject)}
                                                    disabled={isSubmittingInventory || row.awaitingApproval <= 0}
                                                    className="brutal-btn bg-[#fb923c] hover:bg-[#f97316] px-4 py-2 text-sm whitespace-nowrap"
                                                >
                                                    Send Back
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const AdminPayrollWorkspace = ({
            adminUser,
            employees,
            sheetData,
            isRefreshing,
            isSubmittingPayroll,
            onRefresh,
            onToggleCompletion,
        }) => {
            const currentPeriodKey = normalizeDate(getPayrollPeriodStart(new Date()));
            const [selectedPeriodKey, setSelectedPeriodKey] = useState(currentPeriodKey);

            if (!adminUser) return null;
            try {
                const safeEmployees = Array.isArray(employees) ? employees : [];
                const payrollRows = (Array.isArray(sheetData) ? sheetData : []).filter(row =>
                    hasValue(row?.name) &&
                    hasValue(row?.date) &&
                    isPayrollRelevantRow(row)
                );

                const periodStartKeys = payrollRows.map(row => normalizeDate(getPayrollPeriodStart(row.date)));
                const availablePeriodKeys = [...new Set([...periodStartKeys, currentPeriodKey])].sort((a, b) => a.localeCompare(b));
                const activePeriodKey = availablePeriodKeys.includes(selectedPeriodKey) ? selectedPeriodKey : currentPeriodKey;
                const currentPeriodIndex = availablePeriodKeys.indexOf(activePeriodKey);
                const selectedPeriod = buildPayrollPeriodFromStart(activePeriodKey);
                const selectedPeriodRows = payrollRows.filter(row => {
                    const rowDateKey = normalizeDate(row.date);
                    return rowDateKey >= selectedPeriod.startKey && rowDateKey <= selectedPeriod.endKey;
                });

                const allEmployeeNames = [...new Set([
                    ...safeEmployees.map(emp => String(emp?.name || '').trim()).filter(Boolean),
                    ...selectedPeriodRows.map(row => String(row?.name || '').trim()).filter(Boolean),
                ])].sort((a, b) => a.localeCompare(b));

                const employeeSummaries = allEmployeeNames.map(name => {
                    const rows = selectedPeriodRows.filter(row => String(row.name || '').trim() === name);
                    const totalMinutes = rows.reduce((sum, row) => sum + getPayrollRowMinutes(row), 0);
                    const isComplete = rows.length > 0 && rows.every(isEntryLocked);
                    return {
                        name,
                        rowCount: rows.length,
                        totalMinutes,
                        isComplete,
                    };
                });

                const employeesWithHoursCount = employeeSummaries.filter(summary => summary.totalMinutes > 0).length;
                const periodLockedCount = selectedPeriodRows.filter(isEntryLocked).length;
                const periodTotalMinutes = employeeSummaries.reduce((sum, summary) => sum + summary.totalMinutes, 0);
                const completionState = selectedPeriodRows.length === 0
                    ? 'empty'
                    : periodLockedCount === 0
                        ? 'open'
                        : periodLockedCount === selectedPeriodRows.length
                            ? 'completed'
                            : 'mixed';
                const completionLabel = completionState === 'completed'
                    ? 'Completed'
                    : completionState === 'mixed'
                        ? 'Partially Complete'
                        : completionState === 'empty'
                            ? 'No Hours Yet'
                            : 'Open';
                const completionBadgeClass = completionState === 'completed'
                    ? 'bg-[#bbf7d0]'
                    : completionState === 'mixed'
                        ? 'bg-[#fde68a]'
                        : completionState === 'empty'
                            ? 'bg-[#e5e7eb]'
                            : 'bg-[#bae6fd]';

                return (
                    <div className="panel-content-5 flex flex-col h-full min-h-0 animate-fade-in overflow-hidden">
                        <div className="flex flex-col xl:flex-row xl:items-start xl:justify-between gap-4 mb-4 shrink-0">
                            <div>
                                <div className="text-xs font-bold uppercase tracking-[0.2em] text-[#0284c7]">Admin Payroll</div>
                                <h3 className="text-2xl md:text-3xl font-bold font-poppins text-[#060606] mt-1">Payroll Hours</h3>
                                <p className="text-sm font-bold text-gray-600 mt-1">Hi, {adminUser.name}</p>
                                <p className="text-xs md:text-sm font-bold text-gray-500 mt-1">
                                    Each payroll period is anchored to Monday, March 16, 2026 and runs for two weeks.
                                </p>
                            </div>
                            <div className="flex flex-wrap items-center gap-2 shadow-safe-4">
                                <button
                                    onClick={onRefresh}
                                    disabled={isRefreshing || isSubmittingPayroll}
                                    className="brutal-btn bg-white hover:bg-gray-50 px-4 py-2 text-sm flex items-center gap-2"
                                >
                                    <i className={`fas ${isRefreshing ? 'fa-circle-notch spinner' : 'fa-rotate-right'} text-[#38bdf8]`}></i>
                                    <span>{isRefreshing ? 'Refreshing...' : 'Refresh'}</span>
                                </button>
                                <button
                                    onClick={() => onToggleCompletion(selectedPeriod, completionState !== 'completed')}
                                    disabled={isSubmittingPayroll || selectedPeriodRows.length === 0}
                                    className={`brutal-btn px-4 py-2 text-sm flex items-center gap-2 ${
                                        completionState === 'completed'
                                            ? 'bg-white hover:bg-gray-50'
                                            : 'bg-[#4ade80] hover:bg-[#22c55e]'
                                    }`}
                                >
                                    <i className={`fas ${isSubmittingPayroll ? 'fa-circle-notch spinner' : (completionState === 'completed' ? 'fa-lock-open' : 'fa-lock')}`}></i>
                                    <span>
                                        {isSubmittingPayroll
                                            ? 'Saving...'
                                            : (completionState === 'completed' ? 'Mark Incomplete' : 'Mark Complete')}
                                    </span>
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4 mb-4 shrink-0 shadow-safe-4">
                            <div className="xl:col-span-2 flex items-center gap-2 bg-white border-2 border-black rounded-xl p-1 shadow-[2px_2px_0px_0px_#000000]">
                                <button
                                    onClick={() => currentPeriodIndex > 0 && setSelectedPeriodKey(availablePeriodKeys[currentPeriodIndex - 1])}
                                    disabled={currentPeriodIndex <= 0}
                                    className="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 text-[#060606] transition-colors font-bold font-poppins text-lg disabled:opacity-40"
                                >
                                    <i className="fas fa-chevron-left"></i>
                                </button>
                                <span className="font-bold font-poppins text-[#060606] min-w-0 flex-1 text-center text-sm md:text-base px-2">
                                    {selectedPeriod.label}
                                </span>
                                <button
                                    onClick={() => currentPeriodIndex < availablePeriodKeys.length - 1 && setSelectedPeriodKey(availablePeriodKeys[currentPeriodIndex + 1])}
                                    disabled={currentPeriodIndex >= availablePeriodKeys.length - 1}
                                    className="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 text-[#060606] transition-colors font-bold font-poppins text-lg disabled:opacity-40"
                                >
                                    <i className="fas fa-chevron-right"></i>
                                </button>
                            </div>

                            <div className="xl:col-span-2 h-12 flex items-center gap-2 rounded-xl border-2 border-black bg-white px-3 shadow-[2px_2px_0px_0px_#000000]">
                                <i className="fas fa-calendar-days text-[#0284c7]"></i>
                                <select
                                    value={activePeriodKey}
                                    onChange={e => setSelectedPeriodKey(e.target.value)}
                                    className="h-full bg-transparent outline-none font-bold text-sm md:text-base min-w-0 flex-1"
                                >
                                    {availablePeriodKeys.slice().reverse().map(periodKey => {
                                        const period = buildPayrollPeriodFromStart(periodKey);
                                        return (
                                            <option key={period.key} value={period.key}>
                                                {period.fullLabel}
                                            </option>
                                        );
                                    })}
                                </select>
                            </div>

                            <div className="xl:col-span-1 flex items-center xl:justify-end text-xs md:text-sm font-bold text-gray-500 px-1">
                                Pay date {formatFullDate(selectedPeriod.payDate)}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-5 gap-4 mb-4 shrink-0 shadow-safe-4">
                            <div className="xl:col-span-2 rounded-2xl border-2 border-black bg-[#f8fafc] px-4 py-3 shadow-[3px_3px_0px_0px_#000000]">
                                <div className="text-[10px] uppercase font-bold text-gray-500">Period Status</div>
                                <div className={`inline-flex items-center mt-3 rounded-full border-2 border-black px-3 py-1 text-xs font-bold uppercase tracking-wide ${completionBadgeClass}`}>
                                    {completionLabel}
                                </div>
                            </div>
                            <div className="rounded-2xl border-2 border-black bg-[#ecfccb] px-4 py-3 shadow-[3px_3px_0px_0px_#000000]">
                                <div className="text-[10px] uppercase font-bold text-gray-500">Total Hours</div>
                                <div className="text-2xl font-bold font-poppins text-[#060606] mt-2">{formatPayrollHours(periodTotalMinutes)}</div>
                            </div>
                            <div className="rounded-2xl border-2 border-black bg-[#fff7ed] px-4 py-3 shadow-[3px_3px_0px_0px_#000000]">
                                <div className="text-[10px] uppercase font-bold text-gray-500">Employees With Hours</div>
                                <div className="text-2xl font-bold font-poppins text-[#060606] mt-2">{employeesWithHoursCount}</div>
                            </div>
                            <div className="rounded-2xl border-2 border-black bg-[#dbeafe] px-4 py-3 shadow-[3px_3px_0px_0px_#000000]">
                                <div className="text-[10px] uppercase font-bold text-gray-500">Worked Entries</div>
                                <div className="text-2xl font-bold font-poppins text-[#060606] mt-2">{selectedPeriodRows.length}</div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto no-scrollbar shadow-safe-4 pr-1 pb-4">
                            {employeeSummaries.length === 0 ? (
                                <div className="rounded-xl border-2 border-dashed border-gray-300 px-4 py-8 text-center text-sm md:text-base font-bold text-gray-400 bg-white">
                                    No employee records were found for this payroll period.
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 xl:grid-cols-5 gap-4 content-start">
                                    {employeeSummaries.map(summary => {
                                        const rowStatusLabel = summary.rowCount === 0
                                            ? 'No hours'
                                            : summary.isComplete
                                                ? 'Locked'
                                                : 'Open';
                                        const rowStatusClass = summary.rowCount === 0
                                            ? 'bg-[#e5e7eb]'
                                            : summary.isComplete
                                                ? 'bg-[#bbf7d0]'
                                                : 'bg-[#bae6fd]';

                                        return (
                                            <div key={`${selectedPeriod.key}-${summary.name}`} className="xl:col-span-5 rounded-2xl border-2 border-black bg-white px-4 py-3 shadow-[3px_3px_0px_0px_#000000]">

                                                                                    ? 'Clear on save'

                                                                            </div>
                                                                            {(draft.clearSchedule || hasAssignedShift) && (

        };

        // --- MAIN APP COMPONENT ---

        function App() {
            // Updated API URL to your current endpoint
            const scriptUrl = "https://script.google.com/macros/s/AKfycbzPAIaXEZZPamrYn24IAZBr4C2GPf0hcWvxCXUMU_diUPBlGKn0mZsOJM7O8AaeFOAK/exec";
            const employeeFetchErrorMessage = "Could not load employees. Please check the Google Sheet setup.";

            const [currentTime, setCurrentTime] = useState(new Date());
            const [viewMode, setViewMode] = useState('PINPAD'); 
            const [pinInput, setPinInput] = useState("");
            const [selectedId, setSelectedId] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [editTarget, setEditTarget] = useState(null);
            const [editForm, setEditForm] = useState({
                timeIn: '',
                timeInPeriod: '',
                timeOut: '',
                timeOutPeriod: '',
                oldReason: '',
                newReason: ''
            });
            const [directoryMode, setDirectoryMode] = useState('employee');
            const [adminUser, setAdminUser] = useState(null);
            const [adminWeekStart, setAdminWeekStart] = useState(getWeekStartDate(new Date()));
            const [adminScheduleDrafts, setAdminScheduleDrafts] = useState({});
            const [selectedAdminCell, setSelectedAdminCell] = useState(null);
            const [adminTemplateName, setAdminTemplateName] = useState('');
            const [adminTemplateDraft, setAdminTemplateDraft] = useState(buildEmptyAdminTemplateDraft());
            
            // Timeout Logic States
            const lastActivityRef = useRef(Date.now());
            const [showTimeoutWarning, setShowTimeoutWarning] = useState(false);
            const IDLE_LIMIT = 30000; // 30 seconds idle
            const WARNING_TIME = 15000; // 15 seconds warning countdown
            
            // Loading State
            const [isLoadingEmployees, setIsLoadingEmployees] = useState(true);
            const [isFetchingLogs, setIsFetchingLogs] = useState(false);
            const [isFetchingInventory, setIsFetchingInventory] = useState(false);
            const [isSubmittingAction, setIsSubmittingAction] = useState(false);
            const [isSubmittingInventory, setIsSubmittingInventory] = useState(false);
            const [isSubmittingAdminSchedule, setIsSubmittingAdminSchedule] = useState(false);
            const [isSavingShiftTemplates, setIsSavingShiftTemplates] = useState(false);
            const [isSubmittingPayroll, setIsSubmittingPayroll] = useState(false);
            const [fetchError, setFetchError] = useState(null);

            // Dynamic Data State
            const [employees, setEmployees] = useState([]);
            const [sheetData, setSheetData] = useState([]);
            const [inventoryRows, setInventoryRows] = useState([]);
            
            // Settings State (Branding)
            const [settings, setSettings] = useState({
                companyName: "",
                logoUrl: "",
                shiftTemplates: [],
            });

            const [notification, setNotification] = useState(null);
            const [reasonValidationTriggered, setReasonValidationTriggered] = useState(false);

            const buildApiUrl = (type) => `${scriptUrl}?type=${encodeURIComponent(type)}&_=${Date.now()}`;

            const refreshEmployees = async () => {
                const response = await fetch(buildApiUrl('employees'), { cache: 'no-store' });
                if (!response.ok) throw new Error('Failed to fetch employees');
                const data = await response.json();
                const formattedEmployees = data.map(emp => ({ ...emp, isClockedIn: false }));
                setEmployees(formattedEmployees);
                setFetchError(null);
                return formattedEmployees;
            };

            const refreshSettings = async () => {
                try {
                    const response = await fetch(buildApiUrl('settings'), { cache: 'no-store' });
                    if (!response.ok) return null;
                    const data = await response.json();
                    const nextSettings = {
                        companyName: (data.companyName || "").trim(),
                        logoUrl: data.logoUrl || "",
                        shiftTemplates: normalizeAdminShiftTemplates(data.shiftTemplates),
                    };
                    setSettings(nextSettings);
                    return nextSettings;
                } catch (error) {
                    console.error("Error fetching settings:", error);
                    return null;
                }
            };

            const refreshLogs = async ({ showSpinner = true } = {}) => {
                if (showSpinner) setIsFetchingLogs(true);
                try {
                    const response = await fetch(buildApiUrl('logs'), { cache: 'no-store' });
                    if (!response.ok) throw new Error('Failed to fetch timesheet rows');
                    const logData = await response.json();
                    const rows = Array.isArray(logData) ? logData.reverse() : [];
                    setSheetData(rows);
                    return rows;
                } catch (error) {
                    console.error("Error refreshing logs:", error);
                    return null;
                } finally {
                    if (showSpinner) setIsFetchingLogs(false);
                }
            };

            const refreshInventory = async ({ showSpinner = true } = {}) => {
                if (showSpinner) setIsFetchingInventory(true);
                try {
                    const response = await fetch(buildApiUrl('inventory'), { cache: 'no-store' });
                    if (!response.ok) throw new Error('Failed to fetch inventory rows');
                    const inventoryData = await response.json();
                    const rows = sortInventoryRows(Array.isArray(inventoryData) ? inventoryData : []);
                    setInventoryRows(rows);
                    return rows;
                } catch (error) {
                    console.error("Error refreshing inventory:", error);
                    return null;
                } finally {
                    if (showSpinner) setIsFetchingInventory(false);
                }
            };

            const refreshSheetData = async (showToast = false, { showSpinner = true, isInitialLoad = false } = {}) => {
                const hadEmployees = employees.length > 0;
                if (showSpinner) setIsFetchingLogs(true);
                if (showSpinner) setIsFetchingInventory(true);

                let rows = null;
                let inventory = null;
                try {
                    const [employeesResult, settingsResult, logsResult, inventoryResult] = await Promise.allSettled([
                        refreshEmployees(),
                        refreshSettings(),
                        refreshLogs({ showSpinner: false }),
                        refreshInventory({ showSpinner: false }),
                    ]);

                    if (employeesResult.status === 'rejected') {
                        console.error("Error fetching employees:", employeesResult.reason);
                        if (!hadEmployees) {
                            setFetchError(employeeFetchErrorMessage);
                        }
                    }

                    if (settingsResult.status === 'rejected') {
                        console.error("Error refreshing settings:", settingsResult.reason);
                    }

                    rows = logsResult.status === 'fulfilled' ? logsResult.value : null;
                    inventory = inventoryResult.status === 'fulfilled' ? inventoryResult.value : null;
                } finally {
                    if (showSpinner) setIsFetchingLogs(false);
                    if (showSpinner) setIsFetchingInventory(false);
                    if (isInitialLoad) setIsLoadingEmployees(false);
                }

                if (showToast) {
                    setNotification((rows || inventory)
                        ? { type: 'info', message: "Latest spreadsheet updates loaded" }
                        : { type: 'error', message: "Could not pull the latest spreadsheet updates." }
                    );
                }
                return { rows, inventory };
            };

            const getBaseAdminScheduleDraft = (employeeName, dateValue, rows = sheetData) => {
                const sourceRow = getScheduleRowForEmployeeDate(rows, employeeName, dateValue);
                return sourceRow
                    ? buildAdminScheduleDraftFromRow(sourceRow, employeeName, dateValue)
                    : buildEmptyAdminScheduleForm(employeeName, dateValue);
            };

            const getAdminScheduleDraft = (employeeName, dateValue, draftMap = adminScheduleDrafts, rows = sheetData) => {
                const draftKey = buildScheduleCellKey(employeeName, dateValue);
                return draftMap[draftKey] || getBaseAdminScheduleDraft(employeeName, dateValue, rows);
            };

            const updateAdminScheduleDraft = (employeeName, dateValue, patch) => {
                const normalizedDate = normalizeDate(dateValue);
                setAdminScheduleDrafts(prev => {
                    const draftKey = buildScheduleCellKey(employeeName, normalizedDate);
                    const baseDraft = getBaseAdminScheduleDraft(employeeName, normalizedDate);
                    const currentDraft = prev[draftKey] || baseDraft;
                    const nextDraft = typeof patch === 'function'
                        ? patch(currentDraft)
                        : { ...currentDraft, ...patch };
                    const normalizedDraft = {
                        ...nextDraft,
                        name: employeeName,
                        date: normalizedDate,
                        sourceRow: nextDraft?.sourceRow === undefined ? (currentDraft.sourceRow || baseDraft.sourceRow || null) : nextDraft.sourceRow,
                    };

                    if (areAdminScheduleDraftsEquivalent(normalizedDraft, baseDraft)) {
                        const { [draftKey]: _removed, ...rest } = prev;
                        return rest;
                    }

                    return {
                        ...prev,
                        [draftKey]: normalizedDraft,
                    };
                });
            };

            const applyTemplateToAdminSchedule = (employeeName, dateValue, templateId) => {
                const template = getVisibleAdminShiftTemplates(settings.shiftTemplates).find(item => item.id === templateId);
                if (!template) return;

                updateAdminScheduleDraft(employeeName, dateValue, currentDraft => {
                    if (template.clearSchedule) {
                        return {
                            ...currentDraft,
                            schedIn: '',
                            schedInPeriod: 'AM',
                            schedOut: '',
                            schedOutPeriod: 'PM',
                            scheduleStatus: '',
                            clearSchedule: true,
                        };
                    }

                    const parsedIn = parseTimeField(template.schedIn);
                    const parsedOut = parseTimeField(template.schedOut);
                    return {
                        ...currentDraft,
                        schedIn: parsedIn.time,
                        schedInPeriod: parsedIn.period || 'AM',
                        schedOut: parsedOut.time,
                        schedOutPeriod: parsedOut.period || 'PM',
                        scheduleStatus: normalizeAdminScheduleStatus(template.scheduleStatus),
                        clearSchedule: false,
                    };
                });
            };

            const selectAdminCell = (employeeName, dateValue) => {
                setSelectedAdminCell({
                    name: employeeName,
                    date: normalizeDate(dateValue),
                });
            };

            const jumpToAdminWeek = (dateValue) => {
                if (!dateValue) return;
                setAdminWeekStart(getWeekStartDate(dateValue));
                setSelectedAdminCell(null);
                setViewMode('ADMIN');
            };

            const persistAdminShiftTemplates = async (nextTemplates, successMessage) => {
                if (!adminUser || !isAdminRole(adminUser.role) || isSavingShiftTemplates) return false;

                setIsSavingShiftTemplates(true);
                try {
                    const payloadTemplates = normalizeAdminShiftTemplates(nextTemplates).map(template => ({
                        id: template.id,
                        label: template.label,
                        schedIn: template.schedIn,
                        schedOut: template.schedOut,
                        scheduleStatus: normalizeAdminScheduleStatus(template.scheduleStatus),
                    }));

                    const result = await sendToSheet({
                        action: "SAVE_SHIFT_TEMPLATES",
                        editorName: adminUser.name,
                        editorRole: adminUser.role || 'admin',
                        shiftTemplates: payloadTemplates,
                    });

                    if (!result.ok) {
                        setNotification({ type: 'error', message: result.error || "Could not save the shift templates." });
                        return false;
                    }

                    const savedTemplates = normalizeAdminShiftTemplates(result?.parsed?.shiftTemplates || payloadTemplates);
                    setSettings(prev => ({
                        ...prev,
                        shiftTemplates: savedTemplates,
                    }));
                    setNotification({ type: 'success', message: successMessage });
                    return true;
                } catch (err) {
                    console.error("Shift template save failed:", err);
                    setNotification({ type: 'error', message: err?.message || "An unexpected error interrupted the template save." });
                    return false;
                } finally {
                    setIsSavingShiftTemplates(false);
                }
            };
